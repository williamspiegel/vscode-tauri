version: 1
updated_at: 2026-02-22
platform_focus: macos
protocol_version: 1.0.0

capabilities:
  host:
    status: in-progress
    backend: rust
    notes: Rust host now serves protocol-level utility methods for fallback metrics and CSS module discovery used by the web workbench bootstrap. Fallback counters are persisted to disk for trend reporting.
  window:
    status: in-progress
    backend: rust
    notes: Rust now handles open/close/focus/setFullscreen/getState for the main window. Non-main window targets still route to node fallback.
  filesystem:
    status: in-progress
    backend: rust
    notes: Rust now handles readFile/writeFile/stat/watch/unwatch with native watcher backend (notify) and automatic polling fallback when native watcher setup fails.
  terminal:
    status: in-progress
    backend: rust
    notes: Rust now handles create/resize/write/kill session APIs and emits terminal.data chunks from stdout/stderr. PTY-backed resize semantics are still pending.
  clipboard:
    status: in-progress
    backend: rust
    notes: Rust now handles readText/writeText using platform clipboard shell commands with fallback on unsupported hosts.
  dialogs:
    status: in-progress
    backend: rust
    notes: Rust now handles showMessage/openFile/openFolder/saveFile on macOS via AppleScript. Non-macOS still uses node fallback.
  process:
    status: in-progress
    backend: rust
    notes: Rust now handles env/spawn/kill/wait/list with optional `background: true` managed processes and emits process.exit/process.data events. Full lifecycle parity details and advanced stream semantics are still pending.
  power:
    status: in-progress
    backend: rust
    notes: Rust now handles preventSleep/allowSleep/idleState on macOS via caffeinate and ioreg. Non-macOS remains on node fallback.
  os:
    status: in-progress
    backend: rust
    notes: Rust now handles systemInfo/openExternal/showItemInFolder using platform shell commands.
  update:
    status: in-progress
    backend: rust
    notes: Rust now handles update.check/download/install with stateful, non-destructive placeholder responses. Native feed resolution, artifact download, and installer execution are still pending.

test_coverage:
  contract:
    status: implemented
    artifact: build/tauri/contract-test.mjs
  smoke:
