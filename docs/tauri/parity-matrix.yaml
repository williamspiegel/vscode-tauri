    status: in-progress
    backend: rust
    notes: open/save/message flows are Rust-primary on macOS.
  process:
    status: in-progress
    backend: rust
    notes: spawn/kill/env/wait/list are Rust-primary.
  power:
    status: in-progress
    backend: rust
    notes: sleep blocker and idle state are Rust-primary on macOS.
  os:
    status: in-progress
    backend: rust
    notes: openExternal/showItemInFolder/systemInfo are Rust-primary.
  update:
    status: in-progress
    backend: rust
